    <script language=javascript type="text/javascript">
        function relogio() {
            let data = new Date().toLocaleDateString();
            let hora = new Date().toTimeString(); 
            return data + " " + hora; 
        }                
       
        function atualizaTitulo () {
            let dataHora = relogio();
            document.getElementById("nomeGuia").innerHTML = dataHora;
        }

        setInterval(atualizaTitulo, 500);
    </script>

    <script language=javascript type="text/javascript">
        let imagem =  document.getElementById('imagem');
        let parteDoDia = new Date().getHours();
        if (parteDoDia >= 6 && parteDoDia < 12) {
            document.getElementById('cumprimento').innerHTML = ' Bom dia Alexandre, &#128578  bom trabalho para você!';
            document.getElementById('imagem').innerHTML = '<img src="imagens/nascer-do-sol.gif" width="60" height="80">';}
        else if (parteDoDia >= 12 && parteDoDia < 18) {
            document.getElementById('cumprimento').innerHTML = ' Boa tarde Alexandre, &#128578 bom trabalho para você!';
            document.getElementById('imagem').innerHTML = '<img src="imagens/por-do-sol.gif" width="60" height="80">';} 
        else if (parteDoDia >= 18 && parteDoDia < 24) { 
            document.getElementById('cumprimento').innerHTML = ' Boa noite Alexandre, &#128578 bom trabalho para você!';
            document.getElementById('imagem').innerHTML = '<img src="imagens/noite.gif" width="60" height="80">';}
        else {
            document.getElementById('cumprimento').innerHTML = ' Boa madrugada Alexandre, &#128578 bom trabalho para você!';
            document.getElementById('imagem').innerHTML = '<img src="imagens/meia-noite.gif" width="60" height="80">';}   
        
        let diaSemana = new Date().getDay();
        switch (diaSemana) {
            case 1: 
                document.getElementById('sexta').innerHTML = ' Hoje é segunda-feira, ótima semana para você! &#128197;';
                break;
            case 5: 
                document.getElementById('sexta').innerHTML = 'Hoje é sexta-feira, bom final de semana!';
                document.getElementById('sextaImagem').innerHTML = '<img src="imagens/sexta.gif" width="40" height="40">';
                break;
            default:
                document.getElementById('sexta').innerHTML = ''
                break;
        }         
    </script>
